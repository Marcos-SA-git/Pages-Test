<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1084" height="322" viewBox="0 0 1084 322" fill="none">
  <defs>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6.5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="nodeBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123551" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#0a1b2b" stop-opacity="0.56"/>
    </linearGradient>

    <linearGradient id="nodeRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4b1717" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#261010" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="nodeGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#123f2a" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#0b2418" stop-opacity="0.62"/>
    </linearGradient>

    <linearGradient id="pulseBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ddcff" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#a8ecff" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#daf9ff" stop-opacity="0.88"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#daf9ff" stop-opacity="0.88"/>
      <stop offset="0.78" stop-color="#a8ecff" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#7ddcff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="pulseRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff6868" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#ff8c8c" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#ffd0d0" stop-opacity="0.88"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#ffd0d0" stop-opacity="0.88"/>
      <stop offset="0.78" stop-color="#ff8c8c" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ff6868" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="pulseGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5effa6" stop-opacity="0"/>
      <stop offset="0.22" stop-color="#8affbe" stop-opacity="0.26"/>
      <stop offset="0.45" stop-color="#d0ffe3" stop-opacity="0.88"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="0.55" stop-color="#d0ffe3" stop-opacity="0.88"/>
      <stop offset="0.78" stop-color="#8affbe" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#5effa6" stop-opacity="0"/>
    </linearGradient>

    <symbol id="systemNode">
      <rect width="98" height="54" rx="10" fill="url(#nodeBlue)" stroke="#4bc1ff" stroke-opacity="0.88" stroke-width="1.2"/>
      <rect x="12" y="12" width="28" height="4.5" rx="2.25" fill="#d8f6ff" fill-opacity="0.9"/>
      <rect x="12" y="23" width="56" height="3.5" rx="1.75" fill="#a6def8" fill-opacity="0.34"/>
      <rect x="12" y="32" width="42" height="3.5" rx="1.75" fill="#a6def8" fill-opacity="0.22"/>
      <rect x="12" y="43" width="20" height="3" rx="1.5" fill="#a6def8" fill-opacity="0.38"/>
    </symbol>

    <symbol id="incidentNode">
      <rect width="104" height="58" rx="11" fill="url(#nodeRed)" stroke="#ff6f6f" stroke-opacity="0.96" stroke-width="1.4"/>
      <path d="M52 14 L68 42 H36 Z" fill="#ffb0b0" fill-opacity="0.92"/>
      <rect x="49" y="24" width="6" height="10" rx="3" fill="#5d1111"/>
      <circle cx="52" cy="38" r="2.2" fill="#5d1111"/>
    </symbol>

    <symbol id="resolvedNode">
      <rect width="104" height="58" rx="11" fill="url(#nodeGreen)" stroke="#5dff9a" stroke-opacity="0.96" stroke-width="1.4"/>
      <circle cx="52" cy="29" r="16" fill="#183625" stroke="#87ffb3" stroke-opacity="0.9" stroke-width="1.2"/>
      <path d="M44 29 L50 35 L61 23" fill="none" stroke="#d8ffe7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <!-- Paths -->
    <path id="inTop" d="M80 118 H 286"/>
    <path id="inMid" d="M80 161 H 286"/>
    <path id="inBot" d="M80 204 H 286"/>

    <path id="joinTop" d="M 384 118 C 384 118 422.204 152 473.283 152"/>
    <path id="joinMid" d="M 384 161 L 473.283 161"/>
    <path id="joinBot" d="M 384 204 C 379.368 204.168 430.164 170 473.283 170"/>

    <path id="outTop" d="M 578 152 L 740.717 152"/>
    <path id="outMid" d="M 578 161 L 740.717 161"/>
    <path id="outBot" d="M 578 170 L 740.717 170"/>

    <!-- corrected so it starts AFTER the green node -->
    <path id="containedMain" d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161"/>
    <path id="containedThin" d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161"/>

    <!-- Animation masks -->
    <mask id="mInTop">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-54" y="-6" width="108" height="12" rx="6" fill="url(#pulseBlue)">
        <animateMotion dur="2.4s" begin="0s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#inTop"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mInMid">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-54" y="-6" width="108" height="12" rx="6" fill="url(#pulseBlue)">
        <animateMotion dur="2.4s" begin="-0.15s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#inMid"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mInBot">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-54" y="-6" width="108" height="12" rx="6" fill="url(#pulseBlue)">
        <animateMotion dur="2.4s" begin="-0.3s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#inBot"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mJoinTop">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-44" y="-5" width="88" height="10" rx="5" fill="url(#pulseBlue)">
        <animateMotion dur="1.8s" begin="-0.2s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#joinTop"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mJoinMid">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-44" y="-5" width="88" height="10" rx="5" fill="url(#pulseBlue)">
        <animateMotion dur="1.8s" begin="-0.35s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#joinMid"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mJoinBot">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-44" y="-5" width="88" height="10" rx="5" fill="url(#pulseBlue)">
        <animateMotion dur="1.8s" begin="-0.5s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#joinBot"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mOutTop">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-64" y="-7" width="128" height="14" rx="7" fill="url(#pulseRed)">
        <animateMotion dur="1.9s" begin="0s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#outTop"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mOutMid">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-70" y="-7" width="140" height="14" rx="7" fill="url(#pulseRed)">
        <animateMotion dur="1.9s" begin="-0.15s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#outMid"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mOutBot">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-64" y="-7" width="128" height="14" rx="7" fill="url(#pulseRed)">
        <animateMotion dur="1.9s" begin="-0.3s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#outBot"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mContainedMain">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-90" y="-8" width="180" height="16" rx="8" fill="url(#pulseGreen)">
        <animateMotion dur="2.4s" begin="0s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#containedMain"/>
        </animateMotion>
      </rect>
    </mask>

    <mask id="mContainedThin">
      <rect width="1084" height="322" fill="black"/>
      <rect x="-80" y="-5" width="160" height="10" rx="5" fill="url(#pulseGreen)">
        <animateMotion dur="2.4s" begin="-0.25s" repeatCount="indefinite" calcMode="linear" rotate="auto">
          <mpath href="#containedThin"/>
        </animateMotion>
      </rect>
    </mask>
  </defs>

  <g filter="url(#glowSoft)">
    <g transform="translate(286 91)">
      <use href="#systemNode"/>
    </g>
    <g transform="translate(286 134)">
      <use href="#systemNode"/>
    </g>
    <g transform="translate(286 177)">
      <use href="#systemNode"/>
    </g>
  </g>

  <g filter="url(#glowStrong)">
    <g transform="translate(474 132)">
      <use href="#incidentNode"/>
    </g>
  </g>

  <g filter="url(#glowStrong)">
    <g transform="translate(741 132)">
      <use href="#resolvedNode"/>
    </g>
  </g>

  <g filter="url(#glowSoft)">
    <path d="M80 118 H 286" stroke="#39bfff" stroke-opacity="0.88" stroke-width="4.8" stroke-linecap="round"/>
    <path d="M80 161 H 286" stroke="#39bfff" stroke-opacity="0.9" stroke-width="5" stroke-linecap="round"/>
    <path d="M80 204 H 286" stroke="#39bfff" stroke-opacity="0.88" stroke-width="4.8" stroke-linecap="round"/>

    <path d="M 384 118 C 384 118 422.204 152 473.283 152" stroke="#39bfff" stroke-opacity="0.88" stroke-width="4.6" stroke-linecap="round"/>
    <path d="M 384 161 L 473.283 161" stroke="#39bfff" stroke-opacity="0.9" stroke-width="5" stroke-linecap="round"/>
    <path d="M 384 204 C 379.368 204.168 430.164 170 473.283 170" stroke="#39bfff" stroke-opacity="0.88" stroke-width="4.6" stroke-linecap="round"/>

    <path d="M 578 152 L 740.717 152" stroke="#ff6a6a" stroke-opacity="0.94" stroke-width="5.4" stroke-linecap="round"/>
    <path d="M 578 161 L 740.717 161" stroke="#ff6a6a" stroke-opacity="0.98" stroke-width="5.8" stroke-linecap="round"/>
    <path d="M 578 170 L 740.717 170" stroke="#ff6a6a" stroke-opacity="0.94" stroke-width="5.4" stroke-linecap="round"/>

    <path d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161" stroke="#5eff93" stroke-opacity="0.98" stroke-width="7.8" stroke-linecap="round"/>
    <path d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161" stroke="#d7ffe6" stroke-opacity="0.72" stroke-width="2.1" stroke-linecap="round"/>
  </g>

  <g filter="url(#glowStrong)">
    <!-- entradas -->
    <path d="M80 118 H 286" stroke="url(#pulseBlue)" stroke-width="5.4" mask="url(#mInTop)" stroke-linecap="round"/>
    <path d="M80 161 H 286" stroke="url(#pulseBlue)" stroke-width="5.6" mask="url(#mInMid)" stroke-linecap="round"/>
    <path d="M80 204 H 286" stroke="url(#pulseBlue)" stroke-width="5.4" mask="url(#mInBot)" stroke-linecap="round"/>

    <!-- uniones -->
    <path d="M 384 118 C 384 118 422.204 152 473.283 152" stroke="url(#pulseBlue)" stroke-width="5.4" mask="url(#mJoinTop)" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 384 161 L 473.283 161" stroke="url(#pulseBlue)" stroke-width="5.8" mask="url(#mJoinMid)" stroke-linecap="round"/>
    <path d="M 384 204 C 379.368 204.168 430.164 170 473.283 170" stroke="url(#pulseBlue)" stroke-width="5.4" mask="url(#mJoinBot)" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- propagación -->
    <path d="M 578 152 L 740.717 152" stroke="url(#pulseRed)" stroke-width="6" mask="url(#mOutTop)" stroke-linecap="round"/>
    <path d="M 578 161 L 740.717 161" stroke="url(#pulseRed)" stroke-width="6.2" mask="url(#mOutMid)" stroke-linecap="round"/>
    <path d="M 578 170 L 740.717 170" stroke="url(#pulseRed)" stroke-width="6" mask="url(#mOutBot)" stroke-linecap="round"/>

    <!-- resolución -->
    <path d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161" stroke="url(#pulseGreen)" stroke-width="6.8" mask="url(#mContainedMain)" stroke-linecap="round"/>
    <path d="M 845 161 C 900 161 944 161 1004 161 S 1070 161 1128 161" stroke="url(#pulseGreen)" stroke-width="3.2" mask="url(#mContainedThin)" stroke-linecap="round"/>
  </g>
</svg>