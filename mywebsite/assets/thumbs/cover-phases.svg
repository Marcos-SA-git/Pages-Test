      <use href="#trace-set-base" stroke="#a6f7ff" stroke-opacity="0.95" stroke-width="2.2"/>
    </g>

    <g filter="url(#glow-strong)">
      <use href="#p1" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m1)" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#p2" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m2)" stroke-linecap="round" stroke-linejoin="round"/>
