      <use href="#p5" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m5)" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#p6" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m6)" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#p7" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m7)" stroke-linecap="round" stroke-linejoin="round"/>
      <use href="#p8" stroke="url(#pulseGrad)" stroke-width="6" mask="url(#m8)" stroke-linecap="round" stroke-linejoin="round"/>
