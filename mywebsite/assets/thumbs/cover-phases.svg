<svg xmlns="http://www.w3.org/2000/svg" width="1084" height="322" viewBox="0 0 1084 322" fill="none">
  <defs>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="pulseGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8ffcff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#96fdff" stop-opacity="0.08"/>
      <stop offset="35%" stop-color="#a6ffff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#f7ffff" stop-opacity="1"/>
      <stop offset="65%" stop-color="#a6ffff" stop-opacity="0.55"/>
      <stop offset="85%" stop-color="#96fdff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8ffcff" stop-opacity="0"/>
    </linearGradient>

    <g id="trace-set-base" stroke-linecap="round" stroke-linejoin="round">
